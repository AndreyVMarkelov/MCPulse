name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['11', '17']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run lint + tests
        run: ./gradlew check --no-daemon

      - name: Upload quality/test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-quality-reports-java-${{ matrix.java }}
          path: |
            build/reports/checkstyle
            build/reports/tests/test
            build/test-results/test

  docker-smoke:
    runs-on: ubuntu-latest
    needs: quality-and-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose config
        run: docker compose --profile mock-echo config

      - name: Build and run docker mock-echo scenario
        run: docker compose --profile mock-echo up --build --abort-on-container-exit

      - name: Collect docker logs
        if: always()
        run: |
          mkdir -p results/docker-mock-echo
          docker compose --profile mock-echo logs > results/docker-mock-echo/docker-compose.log || true

      - name: Shutdown docker services
        if: always()
        run: docker compose --profile mock-echo down -v || true

      - name: Upload docker test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-mock-echo-results
          path: results/docker-mock-echo
