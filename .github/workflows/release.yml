name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Derive release version from tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Tag must match v<semver>, got '${GITHUB_REF_NAME}'"
            exit 1
          fi
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Prepare signing key for Gradle
        shell: bash
        run: |
          KEY='${{ secrets.MAVEN_SIGNING_PRIVATE_KEY }}'
          KEY="${KEY//$'\r'/}"
          if [[ "$KEY" == *"\\n"* ]]; then
            KEY="$(printf '%b' "${KEY//\\n/\\n}")"
          fi
          if [[ "$KEY" != *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            echo "MAVEN_SIGNING_PRIVATE_KEY is not an ASCII-armored private key"
            exit 1
          fi
          {
            echo 'ORG_GRADLE_PROJECT_signingInMemoryKey<<EOF'
            echo "$KEY"
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Validate signing key format
        shell: bash
        run: |
          tmp_key="$(mktemp)"
          printf '%s\n' "${ORG_GRADLE_PROJECT_signingInMemoryKey}" > "${tmp_key}"
          gpg --batch --import --dry-run "${tmp_key}" >/dev/null 2>&1 || {
            echo "Signing key cannot be parsed by gpg"
            exit 1
          }
          rm -f "${tmp_key}"

      - name: Build artifacts
        run: ./gradlew clean build -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Publish package (GitHub Packages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSPHRASE }}
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Publish package (Maven Central)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSPHRASE }}
        run: ./gradlew publishAndReleaseToMavenCentral -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-reports
          path: |
            build/reports
            build/libs
