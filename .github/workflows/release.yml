name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Derive release version from tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Tag must match v<semver>, got '${GITHUB_REF_NAME}'"
            exit 1
          fi
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Prepare signing key for Gradle
        shell: bash
        env:
          RAW_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_PRIVATE_KEY }}
          RAW_SIGNING_KEY_ID: ${{ secrets.MAVEN_SIGNING_KEY_ID }}
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          echo "::group::Signing key diagnostics"
          echo "RAW_SIGNING_KEY length: ${#RAW_SIGNING_KEY}"
          if [[ "${RAW_SIGNING_KEY}" == *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            echo "RAW_SIGNING_KEY contains BEGIN marker: yes"
          else
            echo "RAW_SIGNING_KEY contains BEGIN marker: no"
          fi

          python3 - "${tmp_dir}" <<'PY'
          import base64
          import binascii
          import os
          import pathlib
          import re
          import sys

          out_dir = pathlib.Path(sys.argv[1])
          raw = os.environ.get("RAW_SIGNING_KEY", "")
          if not raw.strip():
              sys.exit("MAVEN_SIGNING_PRIVATE_KEY is empty")

          def norm_newlines(value: str) -> str:
              return value.replace("\r\n", "\n").replace("\r", "\n")

          def unwrap_quotes(value: str) -> str:
              value = value.strip()
              for marker in ('"""', "'''"):
                  if value.startswith(marker) and value.endswith(marker) and len(value) >= len(marker) * 2:
                      return value[len(marker):-len(marker)].strip()
              if (value.startswith('"') and value.endswith('"')) or (value.startswith("'") and value.endswith("'")):
                  return value[1:-1].strip()
              return value

          def extract_block(value: str):
              match = re.search(
                  r"-----BEGIN PGP PRIVATE KEY BLOCK-----.*?-----END PGP PRIVATE KEY BLOCK-----",
                  value,
                  flags=re.S,
              )
              if not match:
                  return None
              return norm_newlines(match.group(0)).strip() + "\n"

          seen = set()
          candidates = []

          def add_candidate(label: str, value: str):
              value = norm_newlines(value)
              if not value.endswith("\n"):
                  value += "\n"
              if value not in seen:
                  seen.add(value)
                  candidates.append((label, value))

          raw_norm = norm_newlines(raw)
          variants = [
              ("raw", raw_norm),
              ("raw_unescaped_newlines", raw_norm.replace("\\n", "\n")),
              ("unwrapped_quotes", unwrap_quotes(raw_norm)),
              ("unwrapped_quotes_unescaped_newlines", unwrap_quotes(raw_norm).replace("\\n", "\n")),
          ]

          for label, variant in variants:
              if not variant.strip():
                  continue
              add_candidate(label, variant)
              block = extract_block(variant)
              if block:
                  add_candidate(f"{label}_extracted_block", block)

              compact = re.sub(r"\s+", "", variant)
              if compact and re.fullmatch(r"[A-Za-z0-9+/=]+", compact):
                  try:
                      decoded = base64.b64decode(compact, validate=True).decode("utf-8", "ignore")
                      add_candidate(f"{label}_base64_decoded_utf8", decoded)
                      block = extract_block(decoded)
                      if block:
                          add_candidate(f"{label}_base64_extracted_block", block)
                  except (binascii.Error, UnicodeDecodeError):
                      pass

          if not candidates:
              sys.exit("Signing key cannot be parsed: no key candidates found")

          with (out_dir / "manifest.tsv").open("w", encoding="utf-8") as manifest:
              for idx, (label, candidate) in enumerate(candidates, 1):
                  filename = f"candidate_{idx}.asc"
                  (out_dir / filename).write_text(candidate)
                  size = len(candidate.encode("utf-8"))
                  manifest.write(f"{idx}\t{label}\t{filename}\t{size}\n")
          PY

          tmp_key=""
          while IFS=$'\t' read -r idx label filename size; do
            candidate="${tmp_dir}/${filename}"
            log_file="${tmp_dir}/${filename}.gpg.log"
            echo ""
            echo "Candidate #${idx}: label=${label}, file=${filename}, bytes=${size}"
            if gpg --batch --import --dry-run "${candidate}" >/dev/null 2>"${log_file}"; then
              echo "gpg verdict: OK"
              if [[ -s "${log_file}" ]]; then
                cat "${log_file}"
              fi
              tmp_key="${candidate}"
              break
            else
              echo "gpg verdict: FAIL"
              cat "${log_file}"
            fi
          done < "${tmp_dir}/manifest.tsv"

          echo "::endgroup::"

          if [[ -z "${tmp_key}" ]]; then
            echo "Signing key cannot be parsed by gpg. Store exact output of: gpg --armor --export-secret-keys <KEY_ID>"
            exit 1
          fi

          {
            echo 'ORG_GRADLE_PROJECT_signingInMemoryKey<<EOF'
            cat "${tmp_key}"
            echo EOF
          } >> "$GITHUB_ENV"

          if [[ -n "${RAW_SIGNING_KEY_ID:-}" ]]; then
            echo "ORG_GRADLE_PROJECT_signingInMemoryKeyId=${RAW_SIGNING_KEY_ID}" >> "$GITHUB_ENV"
          fi

      - name: Build artifacts
        run: ./gradlew clean build -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Publish package (GitHub Packages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Publish package (Maven Central)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-reports
          path: |
            build/reports
            build/libs
