name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Derive release version from tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Tag must match v<semver>, got '${GITHUB_REF_NAME}'"
            exit 1
          fi
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Prepare signing key for Gradle
        shell: bash
        env:
          RAW_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          tmp_key="$(mktemp)"
          tmp_norm="$(mktemp)"
          printf '%s' "${RAW_SIGNING_KEY}" > "${tmp_key}"

          # Normalize CRLF to LF if key was pasted from Windows clipboard.
          tr -d '\r' < "${tmp_key}" > "${tmp_norm}"
          mv "${tmp_norm}" "${tmp_key}"

          # If key was saved with literal '\n' escapes, convert them to real newlines.
          perl -0777 -i -pe 's/\\n/\n/g' "${tmp_key}"

          # Keep only the armored private-key block if wrappers/extra text were added.
          if grep -q 'BEGIN PGP PRIVATE KEY BLOCK' "${tmp_key}" && grep -q 'END PGP PRIVATE KEY BLOCK' "${tmp_key}"; then
            awk '
              /BEGIN PGP PRIVATE KEY BLOCK/ { in_block=1 }
              in_block { print }
              /END PGP PRIVATE KEY BLOCK/ { exit }
            ' "${tmp_key}" > "${tmp_norm}"
            mv "${tmp_norm}" "${tmp_key}"

            # Normalize wrapper noise around marker lines while keeping body bytes intact.
            sed -E -i.bak \
              -e '1s@^.*(-----BEGIN PGP PRIVATE KEY BLOCK-----).*$@\1@' \
              -e '$s@^.*(-----END PGP PRIVATE KEY BLOCK-----).*$@\1@' \
              "${tmp_key}"
            rm -f "${tmp_key}.bak"
          fi

          # Optional fallback: support base64-encoded armored key stored in the secret.
          if ! gpg --batch --import --dry-run "${tmp_key}" >/dev/null 2>&1; then
            if ! grep -q 'BEGIN PGP PRIVATE KEY BLOCK' "${tmp_key}" && base64 --decode "${tmp_key}" > "${tmp_norm}" 2>/dev/null; then
              mv "${tmp_norm}" "${tmp_key}"
            fi
          fi

          if ! gpg --batch --import --dry-run "${tmp_key}" >/dev/null 2>&1; then
            echo "Signing key cannot be parsed by gpg. Store exact output of: gpg --armor --export-secret-keys <KEY_ID>"
            exit 1
          fi

          {
            echo 'ORG_GRADLE_PROJECT_signingInMemoryKey<<EOF'
            cat "${tmp_key}"
            echo EOF
          } >> "$GITHUB_ENV"
          rm -f "${tmp_key}" "${tmp_norm}"

      - name: Build artifacts
        run: ./gradlew clean build -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Publish package (GitHub Packages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSPHRASE }}
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Publish package (Maven Central)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSPHRASE }}
        run: ./gradlew publishAndReleaseToMavenCentral -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-reports
          path: |
            build/reports
            build/libs
