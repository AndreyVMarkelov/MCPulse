name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Derive release version from tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Tag must match v<semver>, got '${GITHUB_REF_NAME}'"
            exit 1
          fi
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Prepare signing key for Gradle
        shell: bash
        env:
          RAW_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_PRIVATE_KEY }}
        run: |
          tmp_key="$(mktemp)"
          printf '%s' "${RAW_SIGNING_KEY}" > "${tmp_key}"

          # Normalize CRLF to LF if key was pasted from Windows clipboard.
          tr -d '\r' < "${tmp_key}" > "${tmp_key}.clean"
          mv "${tmp_key}.clean" "${tmp_key}"

          # If key was saved with literal '\n' escapes, convert them to real newlines.
          if ! gpg --batch --import --dry-run "${tmp_key}" >/dev/null 2>&1; then
            perl -0777 -pe 's/\\n/\n/g' "${tmp_key}" > "${tmp_key}.clean"
            mv "${tmp_key}.clean" "${tmp_key}"
          fi

          if ! gpg --batch --import --dry-run "${tmp_key}" >/dev/null 2>&1; then
            echo "Signing key cannot be parsed by gpg. Recreate MAVEN_SIGNING_PRIVATE_KEY from exported file."
            exit 1
          fi

          {
            echo 'ORG_GRADLE_PROJECT_signingInMemoryKey<<EOF'
            cat "${tmp_key}"
            echo EOF
          } >> "$GITHUB_ENV"
          rm -f "${tmp_key}"

      - name: Build artifacts
        run: ./gradlew clean build -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Publish package (GitHub Packages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSPHRASE }}
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Publish package (Maven Central)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSPHRASE }}
        run: ./gradlew publishAndReleaseToMavenCentral -PreleaseVersion="${RELEASE_VERSION}" --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-reports
          path: |
            build/reports
            build/libs
